<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubopedia </title>
    <link rel="icon" type="image/png" href="web/imágen/logo.png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: monospace; background: #1a1a1a; color: #eee; padding: 10px; }
        .contenedor { max-width: 800px; margin: auto; }
        header {
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #444;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .logo-header { width: 50px; height: auto; }
        .menu-articulos { background: #252525; padding: 10px; border-radius: 5px; margin-bottom: 15px; }
        .menu-articulos input { background: #333; border: 1px solid #555; color: white; padding: 8px; width: 60%; }
        .alg { background: #444; padding: 2px 5px; border-radius: 3px; font-weight: bold; }
        main { background: #252525; padding: 15px; border-radius: 5px; }
        button { background: #444; color: white; border: none; padding: 8px 12px; cursor: pointer; }
        textarea { width: 100%; height: 300px; background: #333; color: white; border: 1px solid #555; padding: 10px; }
    </style>
</head>
<body>
    <div class="contenedor">
        <header>
            <img src="web/imágen/logo.png" alt="Logo" class="logo-header">
            <div>
                <h1 style="margin:0;">Cubopedia </h1>
                <p style="color:#ffffff; font-size:0.8em; margin:0;">La wiki de Cubos que no le pertenece a nadie</p>
            </div>
        </header>

        <nav class="menu-articulos">
            <input type="text" id="busqueda" placeholder="Buscar o crear...">
            <button onclick="cargarArticulo(document.getElementById('busqueda').value.toLowerCase().replace(/ /g,'-'))">Ir</button>
        </nav>

        <main id="contenido-wiki">
            <p>Iniciando...</p>
        </main>
    </div>
    <script src="js/wiki.js"></script>
</body>
</html>
